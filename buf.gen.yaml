version: v2
inputs:
  - directory: api/proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative
      - default_api_level=API_OPAQUE
      # grpc-gateway writes URL path params directly onto request struct fields,
      # which the Opaque API forbids; keep vault.proto Hybrid (getters/builders
      # still required in our own code) so GetItem/UpdateItem/DeleteItem's
      # {id} path binding keeps compiling.
      - apilevelMvault/vault.proto=API_HYBRID
  - remote: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway
    out: gen
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gen/openapi
    opt:
      - output_format=json
      - allow_merge=true
      - merge_file_name=gophkeeper
